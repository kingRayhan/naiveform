<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative blobs -->
  <circle cx="150" cy="150" r="100" fill="#ff6b35" opacity="0.15" filter="url(#blur)"/>
  <circle cx="1050" cy="480" r="150" fill="#8b5cf6" opacity="0.15" filter="url(#blur)"/>
  
  <!-- Logo and Brand -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#ff6b35"/>
    <path d="M45 25h25l-30 35v-25h-25l30-35v25z" fill="white"/>
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">NaiveForm</text>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="20" fill="#ff8c42">FREE FOREVER</text>
  </g>
  
  <!-- Main Headline -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">
    Build Forms in
    <tspan fill="#ff6b35"> Minutes</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="24" fill="#a0a0a0" text-anchor="middle">
    Drag-and-drop builder • Unlimited forms • Real-time responses • API integrations
  </text>
  
  <!-- Feature Cards -->
  <g transform="translate(150, 450)">
    <!-- Card 1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="260" height="120" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
      <rect x="20" y="20" width="40" height="40" rx="8" fill="#ff6b35"/>
      <path d="M35 30h20l-25 25v-15h-20l25-25v15z" fill="white"/>
      <text x="80" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Drag &amp; Drop</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Intuitive builder</text>
    </g>
    
    <!-- Card 2 -->
    <g transform="translate(320, 0)">
      <rect x="0" y="0" width="260" height="120" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
      <rect x="20" y="20" width="40" height="40" rx="8" fill="#8b5cf6"/>
      <path d="M30 25h40v5h-40zM30 35h40v5h-40zM30 45h40v5h-40z" fill="white"/>
      <text x="80" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Unlimited</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Forms &amp; responses</text>
    </g>
    
    <!-- Card 3 -->
    <g transform="translate(640, 0)">
      <rect x="0" y="0" width="260" height="120" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
      <rect x="20" y="20" width="40" height="40" rx="8" fill="#3b82f6"/>
      <path d="M40 25c-8.3 0-15 6.7-15 15s6.7 15 15 15 15-6.7 15-15-6.7-15-15-15zm0 25l-8-8 3-3 5 5 10-10 3 3-13 13z" fill="white"/>
      <text x="80" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">No Code</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">API &amp; webhooks</text>
    </g>
  </g>
</svg>